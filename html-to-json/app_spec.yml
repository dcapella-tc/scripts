allowOnDemand: true
appId: 230b94ee-2144-588c-94b7-711724ab1d75
category: Utility
displayName: JSON Pretty
features:
- aotExecutionEnabled
- appBuilderCompliant
- fileParams
- redisPasswordSupport
- runtimeVariables
languageVersion: '3.11'
listDelimiter: '|'
minServerVersion: 7.2.0
note: Take raw JSON string and output "pretty" version with provide indent level.
  Optionally sort the keys.
outputData:
- display: '1'
  outputVariables:
  - name: json.pretty
packageName: TCPB_-_Utility_Template
playbook: {}
programLanguage: PYTHON
programMain: run.py
programVersion: 1.0.0
releaseNotes:
- notes:
  - Initial Release
  version: 1.0.0
runtimeLevel: Playbook
schemaVersion: 1.1.0
sdkVersion: 4.0.0
sections:
- params:
  - label: HTML
    name: html
    note: The HTML document or fragment to convert to JSON.
    playbookDataType:
    - String
    required: true
    validValues:
    - ${TEXT}
  - default: '2'
    label: Indent
    name: indent
    note: 'The number of spaces to use for each indent level (default: 2).'
    playbookDataType:
    - String
    validValues:
    - ${TEXT}
  - default: false
    label: Sort Keys
    name: sort_keys
    note: When enabled, JSON object keys are sorted alphabetically at every level.
      For HTML tree output this puts attrs before tag and is usually harder to read;
      leave off for tag, attrs, children order.
    type: Boolean
  sectionName: Inputs
